spring:
  application:
    name: hello

logging:
  level:
    root: INFO
    com.example.hello: DEBUG
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] ${logging.pattern.correlation}%logger{36} - %msg%n"

management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        enabled: true
        endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health,info,beans,conditions